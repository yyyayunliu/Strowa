<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#f7f2e7">
  <meta name="robots" content="noindex,nofollow">
  <title>Strowa — Meet nearby families</title>

  <!-- Leaflet's CSS is required for correct map/tile positioning. -->
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="">

  <style>
    :root{
      --ink:#18372f; --green:#24745a; --green-dark:#185740;
      --mint:#e5f2eb; --cream:#f7f2e7; --paper:#fffdf8;
      --line:#dce2dd; --muted:#6b7873; --danger:#9a423b;
      --shadow:0 14px 38px rgba(22,60,49,.16);
    }
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Arial,sans-serif;color:var(--ink);background:var(--cream)}
    button,input,select,textarea{font:inherit}
    button{cursor:pointer}
    .app{max-width:560px;min-height:100vh;margin:auto;background:var(--paper);position:relative;overflow:hidden}
    header{height:72px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #ebe8df;background:rgba(255,253,248,.96);position:relative;z-index:1100}
    .brand{display:flex;gap:10px;align-items:center}.logo{width:40px;height:40px;border-radius:14px;background:var(--green);color:white;display:grid;place-items:center;font-size:22px;font-weight:900}
    .brand-name{font-size:22px;font-weight:850;letter-spacing:-.7px}.tagline{font-size:9px;letter-spacing:1.25px;color:var(--muted);font-weight:750}
    .header-actions{display:flex;gap:8px;align-items:center}
    .status{border:1px solid var(--line);border-radius:999px;padding:8px 10px;background:white;color:var(--muted);font-size:11px;font-weight:750;max-width:190px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .status.online{background:var(--mint);color:var(--green-dark);border-color:#bddbc9}
    .status.error{background:#fae8e5;color:var(--danger);border-color:#eabdb7}
    .icon-btn{width:38px;height:38px;border-radius:50%;border:1px solid var(--line);background:white;color:var(--ink)}
    .map-wrap{position:relative}
    #map{height:48vh;min-height:350px;width:100%;background:#dfe9e2;z-index:1}
    .privacy{position:absolute;left:12px;right:64px;bottom:12px;z-index:500;background:rgba(255,253,248,.95);border:1px solid rgba(25,75,58,.08);border-radius:12px;padding:9px 11px;font-size:11px;color:var(--muted);box-shadow:0 7px 20px rgba(0,0,0,.1)}
    .locate{position:absolute;right:13px;bottom:13px;z-index:510;width:43px;height:43px;border:0;border-radius:50%;background:white;box-shadow:var(--shadow);font-size:22px;color:var(--green)}
    .map-error{position:absolute;inset:15px;z-index:600;background:rgba(255,253,248,.96);border:1px solid #ebc6c0;border-radius:16px;padding:18px;display:none}
    .map-error.show{display:block}.map-error h3{margin:0 0 7px}.map-error p{font-size:13px;color:var(--muted);line-height:1.5}
    .sheet{position:relative;margin-top:-18px;border-radius:24px 24px 0 0;background:var(--paper);z-index:700;padding:10px 15px 100px;min-height:410px;box-shadow:0 -10px 25px rgba(20,48,40,.07)}
    .handle{width:44px;height:5px;border-radius:99px;background:#d8dcd9;margin:0 auto 15px}
    .sheet-head{display:flex;align-items:end;justify-content:space-between;gap:10px}
    .eyebrow{margin:0 0 3px;font-size:10px;letter-spacing:1.25px;color:var(--muted);font-weight:800}.sheet h1{margin:0;font-size:24px;letter-spacing:-.8px}
    .text-btn{border:0;background:none;color:var(--green);font-weight:800;padding:8px}
    .diagnostic{margin:12px 0;padding:10px 12px;border-radius:13px;background:#f1eee4;color:#5d665f;font-size:12px;line-height:1.45}
    .diagnostic.error{background:#fae9e6;color:#7c3731}.diagnostic.online{background:var(--mint);color:var(--green-dark)}
    .incoming{margin:12px 0;border:1px solid #bad7c6;background:#f0f8f3;border-radius:16px;padding:12px}.incoming h3{margin:0 0 8px;font-size:14px}.hello-item{padding:8px 0;border-top:1px solid #d9e9df;font-size:13px}.hello-item:first-of-type{border-top:0}
    .family{border:1px solid var(--line);border-radius:17px;padding:13px;margin:10px 0;background:white}
    .row{display:flex;justify-content:space-between;gap:10px}.person{display:flex;gap:11px}.avatar{width:43px;height:43px;border-radius:14px;background:var(--mint);display:grid;place-items:center;font-size:21px;flex:0 0 auto}
    .family h3{margin:0 0 2px;font-size:16px}.meta{font-size:12px;color:var(--muted)}.badge{font-size:11px;background:var(--mint);color:var(--green-dark);padding:5px 8px;border-radius:999px;height:max-content}
    .note{font-size:13px;margin:10px 0;color:#46534f;line-height:1.4}.family-actions{display:flex;gap:8px}.primary,.secondary{flex:1;border-radius:11px;padding:10px;font-weight:800}
    .primary{border:0;background:var(--green);color:white}.secondary{border:0;background:#eef0ed;color:var(--ink)}
    .empty{text-align:center;padding:34px 20px;color:var(--muted)}.empty strong{display:block;color:var(--ink);margin-bottom:6px}
    .fab{position:fixed;z-index:1200;bottom:max(18px,env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);width:min(88%,500px);border:0;border-radius:16px;background:var(--green);color:white;padding:16px;font-size:16px;font-weight:850;box-shadow:0 12px 30px rgba(24,85,64,.32)}
    .overlay{position:fixed;inset:0;background:rgba(12,37,30,.44);z-index:2000;display:none;align-items:flex-end;justify-content:center}.overlay.open{display:flex}
    .modal{width:min(100%,560px);max-height:92vh;overflow:auto;background:var(--paper);border-radius:24px 24px 0 0;padding:18px 18px 28px}
    .modal-head{display:flex;justify-content:space-between;gap:10px}.modal h2{margin:2px 0 15px}.close{border:0;background:#eceeea;border-radius:50%;width:36px;height:36px;font-size:21px}
    label{display:block;font-size:12px;font-weight:800;color:#52605b;margin:13px 0 5px}
    input,select,textarea{width:100%;border:1px solid var(--line);border-radius:12px;background:white;padding:12px;color:var(--ink)}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.intent-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .intent{border:1px solid var(--line);border-radius:12px;padding:10px;font-size:13px;margin:0;font-weight:650}.intent input{width:auto}
    .safety{font-size:11px;line-height:1.45;color:var(--muted)}.submit{width:100%;border:0;border-radius:13px;padding:14px;background:var(--green);color:white;font-weight:850}
    .toast{position:fixed;z-index:3000;left:50%;bottom:92px;transform:translate(-50%,18px);background:#15372e;color:white;padding:10px 14px;border-radius:999px;font-size:13px;opacity:0;transition:.2s;pointer-events:none;max-width:90%;text-align:center}.toast.show{opacity:1;transform:translate(-50%,0)}
    .custom-marker{width:42px;height:42px;border-radius:50% 50% 50% 9px;background:var(--green);border:4px solid white;box-shadow:0 6px 17px rgba(24,80,61,.28);transform:rotate(-45deg);display:grid;place-items:center}
    .custom-marker span{transform:rotate(45deg);font-size:17px}.leaflet-popup-content-wrapper{border-radius:14px}.leaflet-popup-content{margin:11px 13px;font-family:inherit}
    @media(min-width:561px){body{padding:18px}.app{border-radius:25px;min-height:calc(100vh - 36px);box-shadow:var(--shadow)}.fab{bottom:34px}}
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand"><div class="logo">S</div><div><div class="brand-name">Strowa</div><div class="tagline">MEET NEARBY FAMILIES</div></div></div>
    <div class="header-actions"><button id="connection" class="status">正在连接…</button><button id="language" class="icon-btn">EN</button></div>
  </header>

  <main>
    <section class="map-wrap">
      <div id="map"></div>
      <div id="mapError" class="map-error"><h3>地图没有加载</h3><p id="mapErrorText"></p></div>
      <div id="privacy" class="privacy">只发布公共地点或约 100 米范围，不记录移动轨迹。</div>
      <button id="locate" class="locate" title="Locate">⌖</button>
    </section>

    <section class="sheet">
      <div class="handle"></div>
      <div class="sheet-head">
        <div><p id="nearbyEyebrow" class="eyebrow">附近现在</p><h1><span id="count">0</span> <span id="familiesText">个家庭在外面</span></h1></div>
        <button id="refresh" class="text-btn">刷新</button>
      </div>
      <div id="diagnostic" class="diagnostic">正在检查地图和数据库连接…</div>
      <div id="incoming" class="incoming" hidden></div>
      <div id="list"></div>
    </section>
  </main>

  <button id="openCheckin" class="fab">＋ <span id="startText">Start strolling</span></button>
</div>

<div id="checkinOverlay" class="overlay">
  <section class="modal">
    <div class="modal-head"><div><p id="checkinEyebrow" class="eyebrow">临时签到</p><h2 id="checkinTitle">你们在哪里溜娃？</h2></div><button class="close" data-close>×</button></div>
    <form id="checkinForm">
      <label id="placeLabel" for="place">公共地点</label>
      <select id="place"></select>

      <button id="pickMap" type="button" class="secondary" style="width:100%;margin-top:9px">在地图上选择公共地点</button>
      <div id="pickedHint" class="safety" style="margin-top:7px">也可以选择预设的鹿特丹公园。</div>

      <label id="aliasLabel" for="alias">临时称呼</label>
      <input id="alias" maxlength="30" value="幽遒爸爸" required>

      <div class="grid">
        <div><label id="ageLabel" for="age">宝宝年龄段</label><select id="age"><option>0–6m</option><option selected>6–12m</option><option>1–2y</option><option>2–4y</option><option>4y+</option></select></div>
        <div><label id="durationLabel" for="duration">显示多久</label><select id="duration"><option value="30">30 min</option><option value="60" selected>60 min</option><option value="90">90 min</option></select></div>
      </div>

      <label id="intentLabel">现在想做什么？</label>
      <div class="intent-grid">
        <label class="intent"><input type="radio" name="intent" value="walk" checked> 🚶 <span data-zh="一起散步" data-en="Walk together">一起散步</span></label>
        <label class="intent"><input type="radio" name="intent" value="play"> 🛝 <span data-zh="一起玩" data-en="Play together">一起玩</span></label>
        <label class="intent"><input type="radio" name="intent" value="chat"> ☕ <span data-zh="聊聊天" data-en="Chat">聊聊天</span></label>
        <label class="intent"><input type="radio" name="intent" value="quiet"> 😴 <span data-zh="安静走走" data-en="Quiet walk">安静走走</span></label>
      </div>

      <label id="noteLabel" for="note">一句话（可选）</label>
      <textarea id="note" rows="2" maxlength="120" placeholder="例如：我们在喷泉旁边，推着绿色婴儿车"></textarea>
      <p id="safety" class="safety">不要填写孩子姓名、电话、住址或精确行程。请只在公共场所见面。</p>
      <button id="publish" class="submit" type="submit">发布临时签到</button>
    </form>
  </section>
</div>

<div id="helloOverlay" class="overlay">
  <section class="modal">
    <div class="modal-head"><div><p id="helloEyebrow" class="eyebrow">匿名打招呼</p><h2 id="helloTitle">👋 Say hi</h2></div><button class="close" data-close>×</button></div>
    <label id="helloAliasLabel" for="helloAlias">你的临时称呼</label>
    <input id="helloAlias" maxlength="30" value="幽遒爸爸">
    <label id="messageLabel" for="helloMessage">消息</label>
    <select id="helloMessage">
      <option>我们也在附近，要不要一起走一会儿？</option>
      <option>我们准备过去，可以打个招呼吗？</option>
      <option>宝宝年龄差不多，想一起玩一会儿吗？</option>
    </select>
    <button id="sendHello" class="submit" style="margin-top:16px">发送招呼</button>
  </section>
</div>

<div id="toast" class="toast"></div>

<!-- Keep config.js beside index.html in the repository root. -->
<script src="./config.js?v=2"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
(() => {
  "use strict";

  const PLACES = [
    {name:"Museumpark", lat:51.9144, lng:4.4731},
    {name:"Het Park", lat:51.9064, lng:4.4669},
    {name:"Kralingse Bos", lat:51.9328, lng:4.5155},
    {name:"Vroesenpark", lat:51.9357, lng:4.4566},
    {name:"Dakpark Rotterdam", lat:51.9068, lng:4.4302},
    {name:"Rotterdam Central Library", lat:51.9201, lng:4.4888}
  ];
  const INTENTS = {
    walk:{zh:"🚶 一起散步",en:"🚶 Walk together"},
    play:{zh:"🛝 一起玩",en:"🛝 Play together"},
    chat:{zh:"☕ 聊聊天",en:"☕ Chat"},
    quiet:{zh:"😴 安静走走",en:"😴 Quiet walk"}
  };

  const $ = s => document.querySelector(s);
  let english = false;
  let map = null;
  let markerLayer = null;
  let selectedPoint = null;
  let pickMode = false;
  let client = null;
  let online = false;
  let activeCheckins = [];
  let helloTarget = null;
  let refreshTimer = null;
  let tileErrors = 0;

  const controlToken = getOrCreateToken();
  let ownId = localStorage.getItem("strowa_own_checkin_id") || "";

  function getOrCreateToken(){
    let token = localStorage.getItem("strowa_control_token");
    if (token && token.length >= 32) return token;
    const bytes = new Uint8Array(32);
    crypto.getRandomValues(bytes);
    token = Array.from(bytes, b => b.toString(16).padStart(2,"0")).join("");
    localStorage.setItem("strowa_control_token", token);
    return token;
  }

  function esc(v){
    return String(v ?? "").replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]));
  }

  function toast(message){
    const el = $("#toast");
    el.textContent = message;
    el.classList.add("show");
    setTimeout(() => el.classList.remove("show"), 2200);
  }

  function setStatus(type, text, detail){
    const badge = $("#connection");
    badge.className = "status " + type;
    badge.textContent = text;
    const diagnostic = $("#diagnostic");
    diagnostic.className = "diagnostic " + type;
    diagnostic.textContent = detail || text;
  }

  function initMap(){
    if (typeof window.L === "undefined"){
      $("#mapError").classList.add("show");
      $("#mapErrorText").textContent = "Leaflet JavaScript 没有从 CDN 加载。请检查网络、广告拦截器或公司网络限制。";
      setStatus("error","地图失败","Leaflet CDN 没有加载；Supabase 仍会继续尝试连接。");
      return;
    }

    map = L.map("map", {zoomControl:true, attributionControl:true}).setView([51.9225,4.4792], 13);
    markerLayer = L.layerGroup().addTo(map);

    const osm = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom:19,
      attribution:'&copy; OpenStreetMap contributors'
    });
    osm.on("tileerror", () => {
      tileErrors++;
      if (tileErrors === 4) {
        $("#mapError").classList.add("show");
        $("#mapErrorText").textContent = "地图框架已加载，但地图瓦片被网络拦截。可以尝试关闭广告拦截器，或改用移动网络打开。";
      }
    });
    osm.addTo(map);

    map.on("click", e => {
      if (!pickMode) return;
      selectedPoint = {
        name: english ? "Selected public place" : "地图所选公共地点",
        lat: round3(e.latlng.lat),
        lng: round3(e.latlng.lng)
      };
      pickMode = false;
      $("#pickedHint").textContent = `${selectedPoint.lat.toFixed(3)}, ${selectedPoint.lng.toFixed(3)} · ${english ? "about 100 m precision" : "约 100 米精度"}`;
      toast(english ? "Public location selected" : "已选择公共地点");
      renderMarkers();
      openOverlay($("#checkinOverlay"));
    });

    setTimeout(() => map.invalidateSize(), 250);
  }

  function round3(value){ return Math.round(Number(value) * 1000) / 1000; }

  function markerIcon(isMine){
    return L.divIcon({
      className:"",
      html:`<div class="custom-marker" style="${isMine ? "background:#c06945" : ""}"><span>${isMine ? "👶" : "👨‍👩‍👧"}</span></div>`,
      iconSize:[42,42],
      iconAnchor:[21,40],
      popupAnchor:[0,-38]
    });
  }

  function renderMarkers(){
    if (!map || !markerLayer) return;
    markerLayer.clearLayers();
    activeCheckins.forEach(item => {
      const isMine = item.id === ownId;
      const marker = L.marker([Number(item.lat), Number(item.lng)], {icon:markerIcon(isMine)}).addTo(markerLayer);
      marker.bindPopup(`<b>${esc(item.alias)}</b><br>${esc(item.place_name)}<br>${esc(intentText(item.intent))}`);
      marker.on("click", () => {
        if (!isMine) {
          helloTarget = item;
          $("#helloTitle").textContent = "👋 " + item.alias;
        }
      });
    });
  }

  function populatePlaces(){
    $("#place").innerHTML = PLACES.map((p,i) => `<option value="${i}">${esc(p.name)}</option>`).join("");
  }

  function getConfig(){
    const cfg = window.STROWA_CONFIG || {};
    return {
      url: String(cfg.SUPABASE_URL || "").trim(),
      key: String(cfg.SUPABASE_PUBLISHABLE_KEY || cfg.SUPABASE_ANON_KEY || "").trim()
    };
  }

  async function initSupabase(){
    const cfg = getConfig();

    if (!cfg.url || !cfg.key){
      setStatus("error","未配置数据库","config.js 中缺少 SUPABASE_URL 或 SUPABASE_PUBLISHABLE_KEY。页面不会在不同手机之间同步。");
      return;
    }
    if (typeof window.supabase === "undefined"){
      setStatus("error","Supabase 失败","Supabase JavaScript CDN 没有加载。请检查网络或内容拦截器。");
      return;
    }

    try{
      client = window.supabase.createClient(cfg.url, cfg.key, {
        auth:{persistSession:false, autoRefreshToken:false, detectSessionInUrl:false}
      });

      const {data, error} = await client.rpc("strowa_list_active_checkins");
      if (error) throw error;

      online = true;
      activeCheckins = Array.isArray(data) ? data : [];
      setStatus("online","● 多人在线", english ? "Database connected. Checking for other families every 5 seconds." : "数据库已连接；每 5 秒检查一次其他家庭。");
      renderAll();
      await loadHellos();
      refreshTimer = setInterval(refreshAll, 5000);
    }catch(err){
      online = false;
      setStatus("error","数据库错误", formatError(err));
    }
  }

  function formatError(err){
    const msg = err?.message || String(err);
    const details = err?.details ? ` · ${err.details}` : "";
    const hint = err?.hint ? ` · ${err.hint}` : "";
    return `Supabase 连接失败：${msg}${details}${hint}`;
  }

  async function refreshAll(){
    if (!client || !online) return;
    try{
      const {data, error} = await client.rpc("strowa_list_active_checkins");
      if (error) throw error;
      activeCheckins = Array.isArray(data) ? data : [];

      if (ownId && !activeCheckins.some(x => x.id === ownId)){
        ownId = "";
        localStorage.removeItem("strowa_own_checkin_id");
      }

      renderAll();
      await loadHellos();
    }catch(err){
      setStatus("error","同步失败",formatError(err));
    }
  }

  async function createCheckin(event){
    event.preventDefault();
    if (!client || !online){
      toast(english ? "Database is not connected" : "数据库尚未连接");
      return;
    }

    const preset = PLACES[Number($("#place").value)] || PLACES[0];
    const point = selectedPoint || preset;
    const payload = {
      p_control_token: controlToken,
      p_alias: $("#alias").value.trim(),
      p_age_band: $("#age").value,
      p_intent: document.querySelector('input[name="intent"]:checked').value,
      p_place_name: selectedPoint ? selectedPoint.name : preset.name,
      p_lat: round3(point.lat),
      p_lng: round3(point.lng),
      p_note: $("#note").value.trim(),
      p_duration_minutes: Number($("#duration").value)
    };

    $("#publish").disabled = true;
    $("#publish").textContent = english ? "Publishing…" : "正在发布…";
    try{
      const {data, error} = await client.rpc("strowa_create_checkin", payload);
      if (error) throw error;
      ownId = data;
      localStorage.setItem("strowa_own_checkin_id", ownId);
      selectedPoint = null;
      closeOverlays();
      toast(english ? "Check-in published" : "签到已发布");
      await refreshAll();
    }catch(err){
      toast(formatError(err));
      setStatus("error","发布失败",formatError(err));
    }finally{
      $("#publish").disabled = false;
      $("#publish").textContent = english ? "Publish check-in" : "发布临时签到";
    }
  }

  async function endOwnCheckin(){
    if (!client || !ownId) return;
    try{
      const {data, error} = await client.rpc("strowa_end_checkin", {
        p_id: ownId,
        p_control_token: controlToken
      });
      if (error) throw error;
      if (!data) throw new Error("The browser token does not own this check-in.");
      ownId = "";
      localStorage.removeItem("strowa_own_checkin_id");
      toast(english ? "Check-in ended" : "签到已结束");
      await refreshAll();
    }catch(err){
      toast(formatError(err));
    }
  }

  async function sendHello(){
    if (!client || !helloTarget) return;
    try{
      const {error} = await client.rpc("strowa_send_hello", {
        p_recipient_id: helloTarget.id,
        p_sender_alias: $("#helloAlias").value.trim() || "Nearby parent",
        p_message: $("#helloMessage").value
      });
      if (error) throw error;
      closeOverlays();
      toast(english ? `Hi sent to ${helloTarget.alias}` : `已向 ${helloTarget.alias} 发送招呼`);
    }catch(err){
      toast(formatError(err));
    }
  }

  async function loadHellos(){
    const box = $("#incoming");
    if (!client || !ownId){
      box.hidden = true;
      box.innerHTML = "";
      return;
    }
    try{
      const {data, error} = await client.rpc("strowa_list_hellos", {
        p_recipient_id: ownId,
        p_control_token: controlToken
      });
      if (error) throw error;
      if (!data || !data.length){
        box.hidden = true;
        box.innerHTML = "";
        return;
      }
      box.hidden = false;
      box.innerHTML = `<h3>${english ? "Hellos received" : "收到的招呼"}</h3>` +
        data.map(h => `<div class="hello-item"><b>${esc(h.sender_alias)}</b><br>${esc(h.message)}</div>`).join("");
    }catch(err){
      console.warn("Hello load failed", err);
    }
  }

  function intentText(intent){
    const item = INTENTS[intent] || INTENTS.walk;
    return english ? item.en : item.zh;
  }

  function relativeTime(iso){
    const mins = Math.max(0, Math.round((Date.now() - new Date(iso).getTime()) / 60000));
    if (english) return mins < 1 ? "just now" : `${mins} min ago`;
    return mins < 1 ? "刚刚" : `${mins} 分钟前`;
  }

  function renderAll(){
    $("#count").textContent = activeCheckins.length;
    const list = $("#list");

    if (!activeCheckins.length){
      list.innerHTML = `<div class="empty"><strong>${english ? "No active check-ins nearby" : "附近暂时没人签到"}</strong>${english ? "Be the first family to appear." : "你可以成为第一个出现的家庭。"}</div>`;
      renderMarkers();
      return;
    }

    list.innerHTML = activeCheckins.map(item => {
      const mine = item.id === ownId;
      return `<article class="family">
        <div class="row">
          <div class="person"><div class="avatar">${mine ? "👶" : "👨‍👩‍👧"}</div><div><h3>${esc(item.alias)}</h3><div class="meta">${esc(item.age_band)} · ${esc(item.place_name)} · ${relativeTime(item.created_at)}</div></div></div>
          <span class="badge">${esc(intentText(item.intent))}</span>
        </div>
        ${item.note ? `<p class="note">${esc(item.note)}</p>` : ""}
        <div class="family-actions">
          ${mine
            ? `<button class="secondary" data-end>${english ? "End check-in" : "结束签到"}</button>`
            : `<button class="primary" data-hello="${esc(item.id)}">👋 ${english ? "Say hi" : "打个招呼"}</button>`}
          <button class="secondary" data-focus="${esc(item.id)}">${english ? "Show on map" : "地图定位"}</button>
        </div>
      </article>`;
    }).join("");

    document.querySelectorAll("[data-hello]").forEach(btn => {
      btn.onclick = () => {
        helloTarget = activeCheckins.find(x => x.id === btn.dataset.hello);
        if (!helloTarget) return;
        $("#helloTitle").textContent = "👋 " + helloTarget.alias;
        openOverlay($("#helloOverlay"));
      };
    });
    document.querySelectorAll("[data-focus]").forEach(btn => {
      btn.onclick = () => {
        const item = activeCheckins.find(x => x.id === btn.dataset.focus);
        if (item && map) map.setView([Number(item.lat),Number(item.lng)],16);
      };
    });
    const end = document.querySelector("[data-end]");
    if (end) end.onclick = endOwnCheckin;

    renderMarkers();
  }

  function locate(){
    if (!map || !navigator.geolocation){
      toast(english ? "Location is unavailable" : "无法使用手机定位");
      return;
    }
    navigator.geolocation.getCurrentPosition(pos => {
      map.setView([pos.coords.latitude,pos.coords.longitude],15);
      L.circleMarker([pos.coords.latitude,pos.coords.longitude],{
        radius:8,color:"#195f48",fillColor:"#3c9b75",fillOpacity:.7
      }).addTo(map).bindPopup(english ? "Your approximate position (not uploaded)" : "你的大致位置（不会上传）").openPopup();
    }, err => toast(english ? `Location failed: ${err.message}` : `定位失败：${err.message}`), {
      enableHighAccuracy:false, timeout:10000, maximumAge:60000
    });
  }

  function openOverlay(el){ el.classList.add("open"); }
  function closeOverlays(){ document.querySelectorAll(".overlay").forEach(x => x.classList.remove("open")); }

  function pickOnMap(){
    closeOverlays();
    if (!map){
      toast(english ? "Map is unavailable" : "地图尚未加载");
      return;
    }
    pickMode = true;
    toast(english ? "Tap a public place on the map" : "请在地图上点击一个公共地点");
  }

  function switchLanguage(){
    english = !english;
    $("#language").textContent = english ? "中" : "EN";
    const pairs = {
      privacy:["只发布公共地点或约 100 米范围，不记录移动轨迹。","Only public places or ~100 m areas are shared. No movement route is stored."],
      nearbyEyebrow:["附近现在","NEARBY NOW"],
      familiesText:["个家庭在外面","families are out"],
      refresh:["刷新","Refresh"],
      startText:["Start strolling","Start strolling"],
      checkinEyebrow:["临时签到","TEMPORARY CHECK-IN"],
      checkinTitle:["你们在哪里溜娃？","Where are you strolling?"],
      placeLabel:["公共地点","Public place"],
      pickMap:["在地图上选择公共地点","Pick a public place on the map"],
      aliasLabel:["临时称呼","Temporary name"],
      ageLabel:["宝宝年龄段","Child age"],
      durationLabel:["显示多久","Visible for"],
      intentLabel:["现在想做什么？","What would you like to do?"],
      noteLabel:["一句话（可选）","Short note (optional)"],
      safety:["不要填写孩子姓名、电话、住址或精确行程。请只在公共场所见面。","Do not share a child's name, phone number, home address or exact route. Meet only in public."],
      helloEyebrow:["匿名打招呼","ANONYMOUS HELLO"],
      helloAliasLabel:["你的临时称呼","Your temporary name"],
      messageLabel:["消息","Message"],
      sendHello:["发送招呼","Send hello"]
    };
    Object.entries(pairs).forEach(([id,values]) => {
      const el = $("#" + id);
      if (el) el.textContent = values[english ? 1 : 0];
    });
    document.querySelectorAll("[data-zh]").forEach(el => el.textContent = english ? el.dataset.en : el.dataset.zh);
    $("#publish").textContent = english ? "Publish check-in" : "发布临时签到";
    renderAll();
    if (online) setStatus("online","● " + (english ? "Multi-user online" : "多人在线"), english ? "Database connected. Checking for other families every 5 seconds." : "数据库已连接；每 5 秒检查一次其他家庭。");
  }

  function bindUI(){
    $("#openCheckin").onclick = () => openOverlay($("#checkinOverlay"));
    $("#checkinForm").onsubmit = createCheckin;
    $("#sendHello").onclick = sendHello;
    $("#refresh").onclick = refreshAll;
    $("#locate").onclick = locate;
    $("#pickMap").onclick = pickOnMap;
    $("#language").onclick = switchLanguage;
    $("#connection").onclick = () => toast($("#diagnostic").textContent);
    document.querySelectorAll("[data-close]").forEach(btn => btn.onclick = closeOverlays);
    document.querySelectorAll(".overlay").forEach(el => el.onclick = e => { if (e.target === el) closeOverlays(); });
  }

  populatePlaces();
  bindUI();
  initMap();
  initSupabase();
  renderAll();
})();
</script>
</body>
</html>
